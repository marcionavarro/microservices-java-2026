spring.application.name=config-service
server.port=8888

#spring.profiles.active=native

#spring.cloud.config.server.native.search-locations=classpath:/configs/{application}

spring.cloud.config.server.git.uri=https://github.com/marcionavarro/microservices-java-2026.git
spring.cloud.config.server.git.search-paths=configs/{application}
spring.cloud.config.server.git.default-label=main

# Self Registration Pattern
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
# Ideal para mabiente containerizados
eureka.instance.prefer-ip-address=true
# Personalizar o Id de cada instância, para facilitar a identificaçăo no Eureka Dashboard
eureka.instance.instance-id=${spring.application.name}:${server.port}
# Indicar que o Service Registry deve monitorar a saúde da aplicaçăo, através actuator, e năo somente Heartbeat
# Opcional - Valor Default = true
eureka.client.healthcheck.enabled=true
# Personalizaçăo de Metadatas para o Eureka Service Registry
eureka.instance.metadata-map.github.repo=marcionavarro/microservices-java-2026

#Configuraçăo minima para atuaçăo com o Service Registry de forma consciente
management.endpoints.web.exposure.include=health,info,metrics
# Atençăo: Cuidado a expor esses dados
# Exibir todas as informaçőes de saúde da aplicaçăo
management.endpoint.health.show-details=always
# Exibir informaçőes no endpoint /actuator/info
management.info.env.enabled=true

# Personalizaçăo de informaçőes do enpoint /actuator/info
info.app.name=${spring.application.name}
info.app.description=Microservice Java 2026
info.app.autor=Marcio Navarro

# Definir a utilizaçăo das Probes Liveness e Readiness + exibiçăo de informaçőes de componentes diversos
# Opcional: Padrăo já é true
management.endpoint.health.probes.enabled=true
management.health.defaults.enabled=true